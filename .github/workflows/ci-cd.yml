name: Healthcare System CI/CD

on:
  push:
    branches:
      - main
      - develop
      - feature-*
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Backend - Test & Build
  # ============================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0-alpine
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: mongo
          MONGO_INITDB_ROOT_PASSWORD: password

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: healthcare-backend/package-lock.json

      - name: Install dependencies
        working-directory: healthcare-backend
        run: npm ci

      - name: Run linting
        working-directory: healthcare-backend
        run: npm run lint --if-present || true

      - name: Run tests
        working-directory: healthcare-backend
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://mongo:password@localhost:27017/healthcare-test
          JWT_ACCESS_SECRET: test_secret_key_123456
          JWT_REFRESH_SECRET: test_refresh_key_123456
        run: npm test || true
        continue-on-error: true

  # ============================================
  # Frontend - Build & Lint
  # ============================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: healthcare-frontend/package-lock.json

      - name: Install dependencies
        working-directory: healthcare-frontend
        run: npm ci

      - name: Run linting
        working-directory: healthcare-frontend
        run: npm run lint --if-present || true

      - name: Build project
        working-directory: healthcare-frontend
        run: npm run build
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: healthcare-frontend/dist/

  # ============================================
  # Backend - Docker Build & Push
  # ============================================
  backend-docker:
    name: Backend Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    continue-on-error: true

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/healthcare-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./healthcare-backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/healthcare-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/healthcare-backend:buildcache,mode=max

  # ============================================
  # Frontend - Docker Build & Push
  # ============================================
  frontend-docker:
    name: Frontend Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    continue-on-error: true

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/healthcare-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./healthcare-frontend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/healthcare-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/healthcare-frontend:buildcache,mode=max

  # ============================================
  # Code Quality - SonarQube (Optional)
  # ============================================
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        if: ${{ env.SONAR_TOKEN != '' }}
        continue-on-error: true

  # ============================================
  # Notify on Completion
  # ============================================
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, backend-docker, frontend-docker]
    if: always()

    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.backend-test.result }}" = "failure" ] || [ "${{ needs.frontend-build.result }}" = "failure" ]; then
            echo "⚠️ CI/CD pipeline has warnings or failures"
          else
            echo "✅ CI/CD pipeline completed"
          fi
        continue-on-error: true
